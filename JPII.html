<h1>Ask JPII</h1>

<p>Search the speeches of Pope John Paul II.</p>

<input type="text" id="searchBox" placeholder="Ask about love, work, suffering...">
<button onclick="askJPII()">Search</button>
<button onclick="randomExcerpt()">Random</button>

<div id="results"></div>

<script>
let speeches = [];

// Load JSON
fetch('speeches.zip')
.then(res => res.arrayBuffer())
.then(data => JSZip.loadAsync(data))
.then(zip => {
    console.log("Files in ZIP:", Object.keys(zip.files));
    return zip.file(Object.keys(zip.files)[0]).async("string");
})
.then(text => {
    speeches = JSON.parse(text);
    console.log("Loaded speeches:", speeches.length);
});

// --- SEARCH FUNCTION ---
function askJPII() {
    if (speeches.length === 0) {
        alert("Still loading data...");
        return;
    }

    const raw = document.getElementById("searchBox").value;

    // --- EXTRACT PHRASES IN QUOTES ---
    const phraseMatches = [...raw.matchAll(/"([^"]+)"/g)];
    let phrases = phraseMatches.map(m => m[1].toLowerCase());

    // --- PARSE QUERY ---
const include = [];
const exclude = [];

const tokens = raw.match(/NOT\s+"[^"]+"|"[^"]+"/gi) || [];

tokens.forEach(token => {
    if (token.toUpperCase().startsWith("NOT")) {
        const phrase = token.match(/"([^"]+)"/)[1].toLowerCase();
        exclude.push(phrase);
    } else {
        const phrase = token.replace(/"/g, "").toLowerCase();
        include.push(phrase);
    }

        mustHave = phrases.slice(0, -1);
    } else {

let results = speeches.filter(s => {
    const text = s.Text.toLowerCase();

    // must include all
    for (let p of include) {
        if (!text.includes(p)) return false;
    }

    }

});

    // --- LIMIT RESULTS ---
    results = results.slice(0, 5);

    if (results.length === 0) {
        document.getElementById("results").innerHTML = "<p>No results found.</p>";

    }

    displayResults(results, mustHave);
}
// --- RANDOM EXCERPT ---
function randomExcerpt() {
    if (speeches.length === 0) {
        alert("Loading speeches... please wait a moment.");
        return;
    }
    const s = speeches[Math.floor(Math.random() * speeches.length)];
    displayResults([s], []);
}

// --- DISPLAY RESULTS ---
function displayResults(results, terms) {
    const container = document.getElementById("results");
    container.innerHTML = "";

    results.forEach((r, index) => {
        const div = document.createElement("div");
        div.className = "result";

        const excerpt = getExcerpt(r.Text, terms);

        div.innerHTML = `
            <p>${highlight(excerpt, terms)}</p>
            <button class="small-btn" onclick="expand(${index})">Expand</button>
            <p id="full-${index}" style="display:none;">
                ${highlight(r.Text, terms)}
            </p>
        `;

        container.appendChild(div);
    });

    window.currentResults = results;
}

// --- EXPAND FULL TEXT ---
function expand(i) {
    const el = document.getElementById("full-" + i);
    el.style.display = "block";
}

// --- EXCERPT FUNCTION ---
function getExcerpt(text, terms) {
    if (terms.length === 0) {
        return text.substring(0, 250) + "...";
    }

    let bestIndex = -1;

    terms.forEach(t => {
        const idx = text.toLowerCase().indexOf(t);
        if (idx !== -1 && (bestIndex === -1 || idx < bestIndex)) {
            bestIndex = idx;
        }
    });

    if (bestIndex === -1) {
        return text.substring(0, 250) + "...";
    }

    const start = Math.max(0, bestIndex - 120);
    const end = Math.min(text.length, bestIndex + 200);

    return "..." + text.substring(start, end) + "...";
}

// --- HIGHLIGHT ---
function highlight(text, terms) {
    let result = text;

    terms.forEach(t => {
        const regex = new RegExp(`(${t})`, "gi");
        result = result.replace(regex, '<span class="highlight">$1</span>');
    });

    return result;
}
</script>
