<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<meta charset="UTF-8">
<title>Ask JPII</title>

</head>
<body>
<div class="main-container">
<nav>
    <a href="index.html">Home</a> |

<h1>Ask JPII</h1>

<p>Search the speeches of Pope Saint John Paul II (queries currently only work in quotations, but Boolean is functional).</p>

<input type="text" id="searchBox" placeholder="Ask about love, work, suffering...">
<button onclick="askJPII()">Search</button>
<button onclick="randomExcerpt()">Random</button>

<div id="results"></div>

<script>
let speeches = [];

// Load JSON
fetch('speeches.zip')
.then(res => res.arrayBuffer())
.then(data => JSZip.loadAsync(data))
.then(zip => {
    console.log("Files in ZIP:", Object.keys(zip.files));
    return zip.file(Object.keys(zip.files)[0]).async("string");
})
.then(text => {
    speeches = JSON.parse(text);
    console.log("Loaded speeches:", speeches.length);
});

// --- SEARCH FUNCTION ---
function askJPII() {
    if (speeches.length === 0) {
        alert("Still loading data...");
        return;
    }

    const raw = document.getElementById("searchBox").value;

    const include = [];
    const exclude = [];

    // Parse phrases with NOT support
    const tokens = raw.match(/NOT\s+"[^"]+"|"[^"]+"/gi) || [];

    tokens.forEach(token => {
        if (token.toUpperCase().startsWith("NOT")) {
            const phrase = token.match(/"([^"]+)"/)[1].toLowerCase();
            exclude.push(phrase);
        } else {
            const phrase = token.replace(/"/g, "").toLowerCase();
            include.push(phrase);
        }
    });

    let results = speeches.filter(s => {
        const text = s.Text.toLowerCase();

        for (let p of include) {
            if (!text.includes(p)) return false;
        }

        for (let p of exclude) {
            if (text.includes(p)) return false;
        }

        return true;
    });

    results = results.slice(0, 5);

    if (results.length === 0) {
        document.getElementById("results").innerHTML = "<p>No results found.</p>";
        return;
    }

    displayResults(results, include);
}
// --- RANDOM EXCERPT ---
function randomExcerpt() {
    if (speeches.length === 0) {
        alert("Loading speeches... please wait a moment.");
        return;
    }
    const s = speeches[Math.floor(Math.random() * speeches.length)];
    displayResults([s], []);
}

// --- DISPLAY RESULTS ---
function displayResults(results, terms) {
    const container = document.getElementById("results");
    container.innerHTML = "";

    results.forEach((r, index) => {
        const div = document.createElement("div");
        div.className = "result";

        const excerpt = getExcerpt(r.Text, terms);

        div.innerHTML = `
            <p>${highlight(excerpt, terms)}</p>
            <button class="small-btn" onclick="expand(${index})">Expand</button>
            <p id="full-${index}" style="display:none;">
                ${highlight(r.Text, terms)}
            </p>
        `;

        container.appendChild(div);
    });

    window.currentResults = results;
}

// --- EXPAND FULL TEXT ---
function expand(i) {
    const el = document.getElementById("full-" + i);
    el.style.display = "block";
}

// --- EXCERPT FUNCTION ---
function getExcerpt(text, terms) {
    if (terms.length === 0) {
        return text.substring(0, 250) + "...";
    }

    let bestIndex = -1;

    terms.forEach(t => {
        const idx = text.toLowerCase().indexOf(t);
        if (idx !== -1 && (bestIndex === -1 || idx < bestIndex)) {
            bestIndex = idx;
        }
    });

    if (bestIndex === -1) {
        return text.substring(0, 250) + "...";
    }

    const start = Math.max(0, bestIndex - 120);
    const end = Math.min(text.length, bestIndex + 200);

    return "..." + text.substring(start, end) + "...";
}

// --- HIGHLIGHT ---
function highlight(text, terms) {
    let result = text;

    terms.forEach(t => {
        const regex = new RegExp(`(${t})`, "gi");
        result = result.replace(regex, '<span class="highlight">$1</span>');
    });

    return result;
}
</script>
<div style="max-width: 600px; margin: 0 auto; padding: 10px;">
    
    <p id="instructions">Please ask JPII anything!</p>

    <div id="chatwindow" style="width: 100%; height: 300px; overflow-y: auto; border: 1px solid black; padding: 10px; background-color: #f8f5e4;">
    </div>

    <br>

    <input type="text" id="userinput" style="width: 80%;">
    <button onclick="clicked()">Send</button>

</div>

<script>
let chatCount = 0;
let greeted = false;
let postLimitIndex = 0;

const postLimitMessages = [
"I’ve enjoyed talking with you, but I have to say my office. Maybe you could try to make daily Mass!",
"I really cannot spend more time chatting with you… consider instead praying for Pope Leo and the Holy Souls in Purgatory!",
"Respectfully, you will better spend your time doing something else… Go outside, for example.",
"Ok fine, we can pray together. Domine Iesu Christe, Fili Dei, miserere mei, peccatoris",
"Domine Iesu Christe, Fili Dei, miserere mei, peccatoris",
"Domine Iesu Christe, Fili Dei, miserere mei, peccatoris",
"Really though, you should get a non-internet-facing hobby"
];

function clicked() {
    let chat = document.getElementById("chatwindow");
    let input = document.getElementById("userinput");
    let text = input.value.toLowerCase();

    // display user message
    chat.innerHTML += "<p><b>You:</b> " + text + "</p>";
    input.value = "";

    let response = "";

    // FIRST CHAT LOGIC
    if (chatCount === 0) {
        if (text.includes("hi") || text.includes("hello") || text.includes("howdy")) {
            response = "Salve!";
            greeted = true;
            chatCount++;
        } else {
            response = "Aren’t you supposed to say hello first?";
            // reset behavior (stay at chatCount 0)
        }
    }

    // SECOND CHAT
    else if (chatCount === 1) {
        response = "While I appreciate technology and what Zach was going for, it’s better we chat in prayer.";
        chatCount++;
    }

    // THIRD CHAT
    else if (chatCount === 2) {
        response = "I’ve enjoyed talking with you, but I have to say my office. Maybe you could try to make daily Mass!";
        chatCount++;
    }

    // AFTER 3 CHATS
    else {
        if (postLimitIndex < postLimitMessages.length) {
            response = postLimitMessages[postLimitIndex];
            postLimitIndex++;
        } else {
            response = "Domine Iesu Christe, Fili Dei, miserere mei, peccatoris";
        }
    }

    // fake "thinking delay"
    setTimeout(() => {
        chat.innerHTML += "<p><b>JPII:</b> " + response + "</p>";
        chat.scrollTop = chat.scrollHeight;
    }, 500);
}
</script>
