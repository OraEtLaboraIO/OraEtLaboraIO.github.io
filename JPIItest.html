<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <meta charset="UTF-8">
    <title>Ask JPII</title>
</head>

<body>
<div class="main-container">

<nav>
    <a href="index.html">Home</a> |
    <a href="projects.html">Projects</a>
</nav>

<h1>Ask JPII</h1>

<p>Search the speeches of Pope Saint John Paul II (queries currently only work in quotations, but Boolean is functional).</p>

<input type="text" id="searchBox" placeholder="Ask about love, work, suffering...">
<button onclick="askJPII()">Search</button>
<button onclick="randomExcerpt()">Random</button>

<div id="results"></div>

<hr>

<!-- CHATBOT -->
<div style="max-width: 600px; margin: 0 auto; padding: 10px;">
    
    <p id="instructions">Please ask JPII anything!</p>

    <div id="chatwindow" style="width: 100%; height: 300px; overflow-y: auto; border: 1px solid black; padding: 10px; background-color: #f8f5e4;"></div>

    <br>

    <input type="text" id="userinput" style="width: 80%;">
    <button onclick="clicked()">Send</button>

</div>

<!-- FOOTER (INSIDE CONTAINER = matches your design) -->
<footer>
✠ &nbsp;&nbsp;&nbsp; <span class="footer-text">Veritas</span> &nbsp;&nbsp;&nbsp; ✠
&nbsp;&nbsp;&nbsp;
<span class="footer-text">Contemplare et Contemplata Aliis Tradere</span>
&nbsp;&nbsp;&nbsp;
✠ &nbsp;&nbsp;&nbsp; <span class="footer-text">Laudare, Benedicere, Praedicare</span> &nbsp;&nbsp;&nbsp; ✠
</footer>

</div>

<!-- ALL SCRIPTS AT BOTTOM -->
<script>
/* =========================
   SEARCH ENGINE
========================= */
let speeches = [];

fetch('speeches.zip')
.then(res => res.arrayBuffer())
.then(data => JSZip.loadAsync(data))
.then(zip => zip.file(Object.keys(zip.files)[0]).async("string"))
.then(text => {
    speeches = JSON.parse(text);
    console.log("Loaded speeches:", speeches.length);
});

window.askJPII = function () {
    if (speeches.length === 0) {
        alert("Still loading data...");
        return;
    }

    const raw = document.getElementById("searchBox").value;
    const include = [];
    const exclude = [];

    const tokens = raw.match(/NOT\s+"[^"]+"|"[^"]+"/gi) || [];

    tokens.forEach(token => {
        if (token.toUpperCase().startsWith("NOT")) {
            exclude.push(token.match(/"([^"]+)"/)[1].toLowerCase());
        } else {
            include.push(token.replace(/"/g, "").toLowerCase());
        }
    });

    let results = speeches.filter(s => {
        const text = s.Text.toLowerCase();
        return include.every(p => text.includes(p)) &&
               !exclude.some(p => text.includes(p));
    }).slice(0,5);

    if (results.length === 0) {
        document.getElementById("results").innerHTML = "<p>No results found.</p>";
        return;
    }

    displayResults(results, include);
};

window.randomExcerpt = function () {
    if (speeches.length === 0) {
        alert("Loading speeches...");
        return;
    }
    const s = speeches[Math.floor(Math.random() * speeches.length)];
    displayResults([s], []);
};

function displayResults(results, terms) {
    const container = document.getElementById("results");
    container.innerHTML = "";

    results.forEach((r, i) => {
        const div = document.createElement("div");
        div.className = "result";

        div.innerHTML = `
            <p>${highlight(getExcerpt(r.Text, terms), terms)}</p>
            <button onclick="expand(${i})">Expand</button>
            <p id="full-${i}" style="display:none;">
                ${highlight(r.Text, terms)}
            </p>
        `;

        container.appendChild(div);
    });

    window.currentResults = results;
}

window.expand = function(i) {
    document.getElementById("full-" + i).style.display = "block";
};

function getExcerpt(text, terms) {
    if (!terms.length) return text.substring(0,250) + "...";

    let idx = terms.map(t => text.toLowerCase().indexOf(t))
                   .filter(i => i !== -1)
                   .sort((a,b)=>a-b)[0];

    if (idx === undefined) return text.substring(0,250) + "...";

    return "..." + text.substring(Math.max(0, idx-120), idx+200) + "...";
}

function highlight(text, terms) {
    terms.forEach(t => {
        text = text.replace(new RegExp(`(${t})`, "gi"),
            '<span class="highlight">$1</span>');
    });
    return text;
}


/* =========================
   CHATBOT
========================= */
let chatStage = 0;
let prayerCount = 0;
let hobbyTriggered = false;

window.clicked = function () {
    const chat = document.getElementById("chatwindow");
    const input = document.getElementById("userinput");
    const text = (input.value || "").toLowerCase();

    if (!text.trim()) return;

    chat.innerHTML += `<p><b>You:</b> ${text}</p>`;
    input.value = "";

    let response = "";

    // --- STAGE LOGIC ---
    if (chatStage === 0) {
        if (text.includes("hello")) {
            response = "Salve!";
            chatStage = 1;
        } else {
            response = "Aren’t you supposed to say hello first?";
        }
    }

    else if (chatStage === 1) {
        response = "While I appreciate technology, it’s better we chat in prayer.";
        chatStage = 2;
    }

    else if (chatStage === 2) {
        response = "I’ve enjoyed talking with you, but I have to say my office. Maybe you could try to make daily Mass!";
        chatStage = 3;
    }

    else {
        // --- POST-LIMIT CONTROL ---
        if (prayerCount < 2) {
            response = "Domine Iesu Christe, Fili Dei, miserere mei, peccatoris";
            prayerCount++;
        } 
        else if (!hobbyTriggered) {
            response = "Really though, you should get a non-internet-facing hobby";
            hobbyTriggered = true;
        } 
        else {
            response = "Domine Iesu Christe, Fili Dei, miserere mei, peccatoris";
        }
    }

    setTimeout(() => {
        chat.innerHTML += `<p><b>JPII:</b> ${response}</p>`;
        chat.scrollTop = chat.scrollHeight;
    }, 400);
};
</script>

</body>
</html>
